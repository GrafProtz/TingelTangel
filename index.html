<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridCrime - Die dunkle Seite der Statistik</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <style>
        /* UI-Anpassung: Füllt das gesamte Fenster ohne Ränder/Scrollbalken */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        #map {
            width: 100vw;
            height: 100vh;
            background: #0f172a;
        }

        /* Intro Overlay Styling */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }

        .branding {
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .branding h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to right, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            font-weight: 900;
        }

        .branding p {
            font-size: 1.2rem;
            color: #94a3b8;
            letter-spacing: 2px;
            margin-top: -10px;
        }

        .menu-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 320px;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .menu-card select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 1rem;
            outline: none;
        }

        .start-btn {
            width: 100%;
            padding: 14px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.4);
        }

        #back-to-menu {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1500;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            backdrop-filter: blur(4px);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Player Marker CSS */
        .player-marker {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .player-dot {
            background-color: red;
            border: 2px solid black;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
            }
            70% {
                transform: scale(1.1);
                box-shadow: 0 0 0 10px rgba(255, 0, 0, 0);
            }
            100% {
                transform: scale(0.9);
                box-shadow: 0 0 0 0 rgba(255, 0, 0, 0);
            }
        }

        /* Tutorial Pulse Animation */
        /* Radikal einfaches Tutorial-Blinken (nur Opacity) */
        @keyframes simplePulse {
            0% { opacity: 0.4; }
            50% { opacity: 1.0; }
            100% { opacity: 0.4; }
        }

        .tutorial-pulse {
            animation: simplePulse 1.5s ease-in-out infinite !important;
        }

        /* Neighbor Marker CSS */
        .neighbor-marker {
            background-color: #2ecc71;
            border: 2px solid black;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        @keyframes hoverRipple {
            0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.8); }
            100% { box-shadow: 0 0 0 15px rgba(46, 204, 113, 0); }
        }

        .neighbor-marker:hover {
            transform: scale(1.3);
            background-color: #27ae60;
            animation: hoverRipple 0.6s ease-out;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24'><path fill='%23000000' d='M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2s-2 .9-2 2s.9 2 2 2M9.8 8.9L7 23h2.1l1.8-8l2.1 2v6h2V15.5l-2.1-2l.6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.8 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1c-.3 0-.5.1-.8.1L9.1 8.1c-.6.3-1 .9-1 1.6c0 .3.1.5.2.8l1.5 2.7l-1.5 2.7l-1.5-2.7c-.1-.3-.2-.5-.2-.8c0-.7.4-1.3 1-1.6l.7-.4z'/></svg>") 16 16, pointer !important;
        }

        /* Tutorial Overlay (Die GROßE Infotafel am oberen Rand) */
        #tutorial-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2500;
            background: rgba(15, 23, 42, 0.95);
            border: 3px solid #22c55e;
            color: #f8fafc;
            padding: 20px 40px;
            border-radius: 20px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            width: 90%;
            max-width: 1000px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: none;
            text-align: center;
            border-bottom: 8px solid #22c55e;
        }

        #tutorial-container h2 {
            color: #4ade80;
            font-size: 1.8rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            margin-right: 20px;
            vertical-align: middle;
        }

        #tutorial-container p {
            font-size: 1.3rem;
            line-height: 1.4;
            color: #cbd5e1;
            margin: 0;
            display: inline-block;
            vertical-align: middle;
        }

        /* HUD System */
        #hud-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2500;
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid #3b82f6;
            color: #f8fafc;
            padding: 10px 30px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            display: none;
        }
    </style>

</head>
<body>

    <div id="intro-overlay">
        <div class="branding">
            <h1>GridCrime</h1>
            <p>AUF DER DUNKLEN SEITE DER STATISTIK</p>
        </div>
        <div class="menu-card">
            <select id="city-dropdown-intro">
                <option value="" disabled selected>Einsatzort wählen...</option>
            </select>
            <button class="start-btn" onclick="startGame()">MISSION STARTEN</button>
        </div>
    </div>

    <button id="back-to-menu" onclick="backToMenu()">← Hauptmenü</button>
    <div id="tutorial-container"></div>
    <div id="hud-container">GUTHABEN: 150 €</div>
    <div id="map"></div>

    <script>
        // 1. & 2. & 3. Startpunkt und Zoom-Level setzen
        var map = L.map('map').setView([51.5139, 7.4653], 16);

        // 4. Standard OpenStreetMap-TileLayer einbinden
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // --- Städte-Daten ---
        const cities = [
            { name: "Berlin", coords: [52.5200, 13.4050] },
            { name: "Hamburg", coords: [53.5511, 9.9937] },
            { name: "München", coords: [48.1371, 11.5755] },
            { name: "Köln", coords: [50.9375, 6.9603] },
            { name: "Frankfurt", coords: [50.1109, 8.6821] },
            { name: "Stuttgart", coords: [48.7758, 9.1829] },
            { name: "Düsseldorf", coords: [51.2277, 6.7735] },
            { name: "Leipzig", coords: [51.3397, 12.3731] },
            { name: "Dortmund", coords: [51.5139, 7.4653] },
            { name: "Essen", coords: [51.4556, 7.0116] },
            { name: "Bremen", coords: [53.0793, 8.8017] },
            { name: "Dresden", coords: [51.0504, 13.7373] },
            { name: "Hannover", coords: [52.3759, 9.7320] },
            { name: "Nürnberg", coords: [49.4521, 11.0767] },
            { name: "Duisburg", coords: [51.4344, 6.7623] },
            { name: "Bochum", coords: [51.4818, 7.2162] },
            { name: "Wuppertal", coords: [51.2562, 7.1508] },
            { name: "Bielefeld", coords: [52.0302, 8.5325] },
            { name: "Bonn", coords: [50.7339, 7.0982] },
            { name: "Münster", coords: [51.9607, 7.6261] },
            { name: "Karlsruhe", coords: [49.0069, 8.4037] },
            { name: "Mannheim", coords: [49.4875, 8.4660] },
            { name: "Augsburg", coords: [48.3705, 10.8978] },
            { name: "Wiesbaden", coords: [50.0782, 8.2398] },
            { name: "Gelsenkirchen", coords: [51.5177, 7.0857] },
            { name: "Dormagen", coords: [51.0963, 6.8406] },
            { name: "Ense", coords: [51.4936, 7.9719] },
            { name: "Sankt Augustin", coords: [50.7702, 7.1852] },
            { name: "Lüneburg", coords: [53.2464, 10.4115] },
            { name: "Herzogenrath", coords: [50.8669, 6.0989] }
        ];

        const dropdown = document.getElementById('city-dropdown-intro');
        cities.sort((a,b) => a.name.localeCompare(b.name)).forEach((city, index) => {
            const opt = document.createElement('option');
            // Wir nutzen den Index im sortierten Array
            opt.value = index;
            opt.textContent = city.name;
            dropdown.appendChild(opt);
        });

        // Wir brauchen eine Referenz auf das sortierte Array für startGame
        const sortedCities = [...cities].sort((a,b) => a.name.localeCompare(b.name));

        function startGame() {
            const index = dropdown.value;
            if (index === "") return;

            const city = sortedCities[index];
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('back-to-menu').style.display = 'block';

            // PHASE 1: Erstmal Stadt-Überblick (Zoom 13)
            map.setView(city.coords, 13);
            
            // Kurze Info-Tafel für Initialisierung
            const container = document.getElementById('tutorial-container');
            container.innerHTML = "<h2>GridCrime</h2><p>INITIALISIERE DATEN-GRID FÜR " + city.name.toUpperCase() + "...</p>";
            container.style.display = 'block';

            // PHASE 2: Nach 2 Sekunden nah ranzoomen
            setTimeout(() => {
                map.flyTo(city.coords, 18, {
                    duration: 2.5,
                    easeLinearity: 0.25
                });
                
                // Sobald der Zoom fertig ist, Spiel initialisieren
                map.once('moveend', () => {
                    initGame();
                });
            }, 2000);
        }

        // --- Tutorial Logik ---
        var tutorialActive = false;
        var tutorialFinished = false;

        function startTutorial() {
            if (tutorialFinished) return;
            tutorialActive = true;
            const container = document.getElementById('tutorial-container');
            container.innerHTML = "<h2>Mission gestartet</h2><p>STANDORT ERFASST. BEWEGE DICH ZU EINEM BENACHBARTEN KNOTENPUNKT, UM DIE STATISTISCHE SIGNATUR ZU VERSCHLEIERN.</p>";
            container.style.display = 'block';
        }

        function completeTutorial() {
            if (!tutorialActive) return;
            tutorialActive = false;
            tutorialFinished = true;
            const container = document.getElementById('tutorial-container');
            container.innerHTML = "<h2>Ziel erreicht</h2><p>ERSTER SCHRITT ERFOLGREICH. SIGNATUR GEDÄMPFT. JEDER SCHRITT KOSTET 10 EURO. DU MUSST SPARSAM MIT DEM GELD UMGEHEN, DU HAST NUR 150 EURO ZUR VERFÜGUNG.</p>";
            // Tafel bleibt dauerhaft eingeblendet
        }

        function gameOver() {
            gameActive = false;
            const container = document.getElementById('tutorial-container');
            container.innerHTML = "<h2>Game Over</h2><p>FINANZIELLE MITTEL ERSCHÖPFT. DIE STATISTIK HAT DICH EINGEHOLT.</p>";
            container.style.display = 'block';
            
            // Bewegung verhindern
            neighborMarkers.forEach(m => map.removeLayer(m));
            neighborMarkers = [];
        }

        function backToMenu() {
            document.getElementById('intro-overlay').style.display = 'flex';
            document.getElementById('back-to-menu').style.display = 'none';
            resetGameState();
        }

        function resetGameState() {
            nodesData = {};
            waysData = {};
            nodeToWays = {};
            if (playerMarker) map.removeLayer(playerMarker);
            playerMarker = null;
            neighborMarkers.forEach(m => map.removeLayer(m));
            neighborMarkers = [];
            budget = 150;
            gameActive = false;
            document.getElementById('hud-container').style.display = 'none';
            document.getElementById('tutorial-container').style.display = 'none';
        }

        // --- Globaler Status ---
        var playerMarker;
        var currentPlayerNodeId;
        var neighborMarkers = [];
        var nodesData = {};
        var waysData = {};
        var nodeToWays = {};
        var budget = 150;
        var gameActive = false;

        function createPlayerMarker(coords) {
            var playerIcon = L.divIcon({
                className: 'player-marker',
                html: '<div class="player-dot"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            if (playerMarker) {
                playerMarker.setLatLng(coords);
            } else {
                playerMarker = L.marker(coords, {icon: playerIcon, zIndexOffset: 1000}).addTo(map);
            }
        }

        async function initGame() {
            console.log("Initialisiere Netzwerk...");
            var bounds = map.getBounds();
            if (!bounds.isValid()) {
                console.log("Bounds noch nicht valide, warte...");
                setTimeout(initGame, 200);
                return;
            }

            const success = await loadNetwork(bounds);
            if (success) {
                const intersectionNodes = Object.keys(nodeToWays).filter(id => nodeToWays[id].size > 1);
                
                if (intersectionNodes.length > 0) {
                    const startNodeId = intersectionNodes[Math.floor(Math.random() * intersectionNodes.length)];
                    
                    if (!tutorialFinished) {
                        // Wichtig: tutorialActive ZUERST auf true setzen, damit updateNeighbors es weiß
                        tutorialActive = true;
                        startTutorial();
                    }

                    gameActive = true;
                    budget = 150;
                    document.getElementById('hud-container').innerText = `GUTHABEN: ${budget} €`;
                    document.getElementById('hud-container').style.display = 'block';

                    // isInitial = true verhindert, dass das Tutorial sofort beendet wird
                    moveToNode(startNodeId, true);
                } else {
                    console.warn("Keine Kreuzungen im Ausschnitt gefunden.");
                    const container = document.getElementById('tutorial-container');
                    container.innerHTML = "<h2>Fehler</h2><p>KEINE KREUZUNGEN GEFUNDEN. BITTE ANDEREN STANDORT WÄHLEN.</p>";
                }
            } else {
                const container = document.getElementById('tutorial-container');
                container.innerHTML = "<h2>Fehler</h2><p>DATEN-GRID NICHT ERREICHBAR. PRÜFE DEINE VERBINDUNG.</p>";
            }
        }

        async function loadNetwork(bounds) {
            // Wir erweitern den abzufragenden Kartenausschnitt um ca. 500 Meter,
            // damit beim extrem nahen Zoom (Stufe 18) keine angrenzenden Knotenpunkte verschwinden.
            const center = map.getCenter();
            const offset = 0.005; 
            const s = center.lat - offset;
            const w = center.lng - offset;
            const n = center.lat + offset;
            const e = center.lng + offset;

            const query = `
                [out:json][timeout:15];
                way["highway"](${s},${w},${n},${e});
                (._;>;);
                out body;
            `;
            try {
                const response = await fetch('https://overpass-api.de/api/interpreter', {
                    method: 'POST',
                    body: 'data=' + encodeURIComponent(query)
                });
                const data = await response.json();
                
                // Graphen-Daten aufbereiten
                data.elements.forEach(el => {
                    if (el.type === 'node') {
                        nodesData[el.id] = el;
                    } else if (el.type === 'way') {
                        waysData[el.id] = el;
                        el.nodes.forEach(nodeId => {
                            if (!nodeToWays[nodeId]) nodeToWays[nodeId] = new Set();
                            nodeToWays[nodeId].add(el.id);
                        });
                    }
                });
                return true;
            } catch (err) {
                console.error("Netzwerk-Fehler:", err);
                return false;
            }
        }

        function moveToNode(nodeId, isInitial = false) {
            if (!gameActive && !isInitial) return;
            
            if (tutorialActive && !isInitial) completeTutorial();
            
            if (!isInitial) {
                budget -= 10;
                document.getElementById('hud-container').innerText = `GUTHABEN: ${budget} €`;
                
                if (budget <= 0) {
                    budget = 0;
                    document.getElementById('hud-container').innerText = `GUTHABEN: ${budget} €`;
                    gameOver();
                }
            }
            
            currentPlayerNodeId = nodeId;
            const node = nodesData[nodeId];
            if (!node) return;

            const coords = [node.lat, node.lon];
            createPlayerMarker(coords);
            map.panTo(coords);
            
            if (budget > 0) {
                updateNeighbors(nodeId);
            }
        }

        function updateNeighbors(nodeId) {
            // Alte Nachbarn entfernen
            neighborMarkers.forEach(m => map.removeLayer(m));
            neighborMarkers = [];

            const neighbors = findNextIntersections(nodeId);
            
            neighbors.forEach(nId => {
                const node = nodesData[nId];
                if (!node) return;

                const neighborIcon = L.divIcon({
                    className: 'neighbor-marker', // Nur die Basis-Klasse bei Erstellung
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                });

                const marker = L.marker([node.lat, node.lon], {icon: neighborIcon})
                    .addTo(map)
                    .on('click', () => moveToNode(nId));
                
                // Radikal einfache DOM-Manipulation
                if (tutorialActive) {
                    const el = marker.getElement();
                    if (el) {
                        el.classList.add('tutorial-pulse');
                        console.log("Marker-Element Klasse hinzugefügt");
                    }
                }
                
                neighborMarkers.push(marker);
            });
        }

        function findNextIntersections(nodeId) {
            const neighbors = new Set();
            const ways = nodeToWays[nodeId] || [];
            
            ways.forEach(wayId => {
                const way = waysData[wayId];
                const nodes = way.nodes;
                const index = nodes.indexOf(parseInt(nodeId));
                if (index === -1) return;

                // Suche vorwärts zur nächsten Kreuzung
                for (let i = index + 1; i < nodes.length; i++) {
                    const nextId = nodes[i];
                    if (nodeToWays[nextId] && nodeToWays[nextId].size > 1) {
                        neighbors.add(nextId);
                        break;
                    }
                }
                // Suche rückwärts zur nächsten Kreuzung
                for (let i = index - 1; i >= 0; i--) {
                    const prevId = nodes[i];
                    if (nodeToWays[prevId] && nodeToWays[prevId].size > 1) {
                        neighbors.add(prevId);
                        break;
                    }
                }
            });
            return neighbors;
        }

        map.whenReady(() => {
            // Wir warten nun auf den Start-Button im Intro
        });
    </script>

</body>
</html>
