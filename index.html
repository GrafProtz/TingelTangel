<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridCrime - Die dunkle Seite der Statistik</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E1RX6GJRVB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E1RX6GJRVB');
    </script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Eigene Styles -->
    <link rel="stylesheet" href="style.css" />
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

    <!-- Startbildschirm -->
    <div id="intro-overlay">
        <div class="branding">
            <h1>GridCrime</h1>
            <p>AUF DER DUNKLEN SEITE DER STATISTIK</p>
        </div>
        <div class="menu-card">
            <select id="city-dropdown-intro">
                <option value="" disabled selected>Einsatzort wählen...</option>
                <option value="0">Berlin</option>
                <option value="1">Hamburg</option>
                <option value="2">München</option>
                <option value="3">Dortmund</option>
                <option value="4">Köln</option>
            </select>
            <button class="start-btn">MISSION STARTEN</button>
        </div>
    </div>

    <!-- In-Game UI -->
    <button id="back-to-menu" style="display: none;">← Hauptmenü</button>
    <button id="info-toggle-btn" style="display: none;"><<</button>
    
    <div id="budget-panel" style="display: none;">
        Budget: 0 €
    </div>
    
    <div id="info-panel"></div>

    <div id="options-container" style="display: none;">
        <h2 style="color: #facc15; margin-top: 0;">In der Kneipe</h2>
        <p id="options-text">Du hörst dich unauffällig um. Was tust du?</p>
        <div id="options-buttons">
            <button class="option-btn">A: Dem Barkeeper Trinkgeld geben (50 €)</button>
            <button class="option-btn">B: Mit den düsteren Gestalten reden</button>
            <button class="option-btn">C: Eine Runde ausgeben (150 €)</button>
            <button class="option-btn">D: Wieder gehen</button>
        </div>
    </div>
    <div id="app-container">
        <div id="map"></div>
    </div>
    
    <!-- Pub Overlay (Screen Space) -->
    <div id="pub-overlay-ui" class="pub-inactive" style="display: none;"></div>

    <!-- Start der App via ES6-Modul -->
    <script type="module" src="main.js"></script>
</body>
</html>
