<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridCrime - Die dunkle Seite der Statistik</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Eigene Styles -->
    <link rel="stylesheet" href="style.css" />
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

    <div id="intro-overlay">
        <div class="branding">
            <h1>GridCrime</h1>
            <p>AUF DER DUNKLEN SEITE DER STATISTIK</p>
        </div>
        <div class="menu-card">
            <select id="city-dropdown-intro">
                <option value="" disabled selected>Einsatzort wählen...</option>
            </select>
            <button class="start-btn" onclick="startGame()">MISSION STARTEN</button>
        </div>
    </div>

    <div id="options-container">
        <h2 style="color: #facc15; margin-top: 0;">In der Kneipe</h2>
        <p>Du hörst dich unauffällig um. Was tust du?</p>
        <button class="option-btn" onclick="selectOption('A')">A: Dem Barkeeper ein großzügiges Trinkgeld geben (50 €)</button>
        <button class="option-btn" onclick="selectOption('B')">B: Mit den düsteren Gestalten am Eck-Tisch reden</button>
        <button class="option-btn" onclick="selectOption('C')">C: Eine Runde für die ganze Kneipe ausgeben (150 €)</button>
        <button class="option-btn" onclick="selectOption('D')">D: Nur kurz umsehen und wieder gehen</button>
    </div>

    <button id="back-to-menu" onclick="backToMenu()">← Hauptmenü</button>
    <div id="tutorial-container"></div>
    <div id="hud-container" class="hud-bottom">GUTHABEN: 150 €</div>
    <div id="map"></div>

    <script>
        // --- GLOBALE HILFSFUNKTIONEN ---
        function dist2(v, w) {
            return Math.pow(v.lat - w.lat, 2) + Math.pow(v.lon - w.lon, 2);
        }

        function getNearestNode(lat, lon, nodeIdsArray, nodesDictionary) {
            let minDist = Infinity;
            let nearestId = null;
            nodeIdsArray.forEach(id => {
                const n = nodesDictionary[id];
                if (!n) return;
                const dist = dist2(n, {lat: lat, lon: lon});
                if (dist < minDist) {
                    minDist = dist;
                    nearestId = id;
                }
            });
            return nearestId ? nodesDictionary[nearestId] : null;
        }

        // --- Globaler Status ---
        var playerMarker;
        var currentPlayerNodeId;
        var neighborMarkers = [];
        var nodesData = {};
        var waysData = {};
        var nodeToWays = {};
        var budget = 300;
        var gameActive = false;
        var moveCounter = 0;
        var pubMarker = null;
        var pubsData = [];
        var targetPubNode = null;
        var targetName = "";
        var tutorialActive = false;
        var tutorialFinished = false;
        var canInteractWithPub = false;

        var pubIconNormal = L.divIcon({
            className: 'bier-icon',
            html: `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='32' height='32'><path fill='#facc15' d='M6 2h10v2H6V2zm1 3h8v16a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1V5zm10 2h1c1.1 0 2 .9 2 2v6c0 1.1-.9 2-2 2h-1v-2h1V9h-1V7z'/></svg>`,
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        var pubIconActive = L.divIcon({
            className: 'bier-icon bier-active',
            html: `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='32' height='32'><path fill='#facc15' d='M6 2h10v2H6V2zm1 3h8v16a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1V5zm10 2h1c1.1 0 2 .9 2 2v6c0 1.1-.9 2-2 2h-1v-2h1V9h-1V7z'/></svg>`,
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        // 1. & 2. & 3. Startpunkt und Zoom-Level setzen
        var map = L.map('map').setView([51.5139, 7.4653], 16);

        // LEAFLET PANE-MANAGEMENT: Eigenes Pane für Kneipe mit hohem Z-Index
        map.createPane('targetPane');
        map.getPane('targetPane').style.zIndex = 650;

        // 4. Standard OpenStreetMap-TileLayer einbinden
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // --- Städte-Daten ---
        const cities = [
            { name: "Berlin", coords: [52.5200, 13.4050] },
            { name: "Hamburg", coords: [53.5511, 9.9937] },
            { name: "München", coords: [48.1371, 11.5755] },
            { name: "Köln", coords: [50.9375, 6.9603] },
            { name: "Frankfurt", coords: [50.1109, 8.6821] },
            { name: "Stuttgart", coords: [48.7758, 9.1829] },
            { name: "Düsseldorf", coords: [51.2277, 6.7735] },
            { name: "Leipzig", coords: [51.3397, 12.3731] },
            { name: "Dortmund", coords: [51.5139, 7.4653] },
            { name: "Essen", coords: [51.4556, 7.0116] },
            { name: "Bremen", coords: [53.0793, 8.8017] },
            { name: "Dresden", coords: [51.0504, 13.7373] },
            { name: "Hannover", coords: [52.3759, 9.7320] },
            { name: "Nürnberg", coords: [49.4521, 11.0767] },
            { name: "Duisburg", coords: [51.4344, 6.7623] },
            { name: "Bochum", coords: [51.4818, 7.2162] },
            { name: "Wuppertal", coords: [51.2562, 7.1508] },
            { name: "Bielefeld", coords: [52.0302, 8.5325] },
            { name: "Bonn", coords: [50.7339, 7.0982] },
            { name: "Münster", coords: [51.9607, 7.6261] },
            { name: "Karlsruhe", coords: [49.0069, 8.4037] },
            { name: "Mannheim", coords: [49.4875, 8.4660] },
            { name: "Augsburg", coords: [48.3705, 10.8978] },
            { name: "Wiesbaden", coords: [50.0782, 8.2398] },
            { name: "Gelsenkirchen", coords: [51.5177, 7.0857] },
            { name: "Dormagen", coords: [51.0963, 6.8406] },
            { name: "Ense", coords: [51.4936, 7.9719] },
            { name: "Sankt Augustin", coords: [50.7702, 7.1852] },
            { name: "Lüneburg", coords: [53.2464, 10.4115] },
            { name: "Herzogenrath", coords: [50.8669, 6.0989] }
        ];

        const dropdown = document.getElementById('city-dropdown-intro');
        cities.sort((a,b) => a.name.localeCompare(b.name)).forEach((city, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.textContent = city.name;
            dropdown.appendChild(opt);
        });

        const sortedCities = [...cities].sort((a,b) => a.name.localeCompare(b.name));

        function startGame() {
            const index = dropdown.value;
            if (index === "") return;

            const city = sortedCities[index];
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('back-to-menu').style.display = 'block';

            // PHASE 1: Erstmal Stadt-Überblick (Zoom 13)
            map.setView(city.coords, 13);
            
            // Kurze Info-Tafel für Initialisierung
            const container = document.getElementById('tutorial-container');
            container.innerHTML = "<h2>GridCrime</h2><p>INITIALISIERE DATEN-GRID FÜR " + city.name.toUpperCase() + "...</p>";
            container.style.display = 'block';

            // PHASE 2: Nach 2 Sekunden nah ranzoomen
            setTimeout(() => {
                map.flyTo(city.coords, 18, {
                    duration: 2.5,
                    easeLinearity: 0.25
                });
                
                // Sobald der Zoom fertig ist, Spiel initialisieren
                map.once('moveend', () => {
                    initGameMap(city.coords);
                });
            }, 2000);
        }

        async function initGameMap(cityCoords) {
            console.log("LOG 1: Start Overpass-Query für Wege...");
            var bounds = map.getBounds();
            if (!bounds.isValid()) {
                console.log("Bounds noch nicht valide, warte...");
                setTimeout(() => initGameMap(cityCoords), 200);
                return;
            }

            const success = await loadNetwork(bounds);
            if (!success) {
                alert("OSM-Daten konnten nicht geladen werden!");
                return;
            }

            console.log("LOG 2: Wege empfangen, baue Graph...");
            
            // WICHTIG: Nur existierende Knoten verwenden, um Sackgassen zu vermeiden.
            const intersectionNodes = Object.keys(nodeToWays).filter(id => {
                if (!nodesData[id]) return false; // Knoten muss physisch im Datensatz existieren
                if (nodeToWays[id].size > 1) return true; // Echte Kreuzung
                
                // Um Sackgassen-Crashes zu verhindern: Auch Start-/Endpunkte von Wegen sind gültige Knoten
                let isEndpoint = false;
                nodeToWays[id].forEach(wayId => {
                    const way = waysData[wayId];
                    if (way && way.nodes && (way.nodes[0] == id || way.nodes[way.nodes.length - 1] == id)) {
                        isEndpoint = true;
                    }
                });
                return isEndpoint;
            });
            
            if (intersectionNodes.length > 0) {
                
                // NEU: Filtere nach bevorzugten Straßentypen für den Spawn (vermeidet Fußgängerzonen)
                const preferredNodes = intersectionNodes.filter(id => {
                    let isPreferred = false;
                    nodeToWays[id].forEach(wayId => {
                        const way = waysData[wayId];
                        if (way && way.tags && way.tags.highway) {
                            const hw = way.tags.highway;
                            if (hw === 'residential' || hw === 'tertiary' || hw === 'secondary') {
                                isPreferred = true;
                            }
                        }
                    });
                    return isPreferred;
                });

                let startNodeId;
                if (preferredNodes.length > 0) {
                    startNodeId = preferredNodes[Math.floor(Math.random() * preferredNodes.length)];
                    console.log("Startpunkt auf bevorzugter Straße gesetzt (residential/tertiary/secondary).");
                } else {
                    startNodeId = intersectionNodes[Math.floor(Math.random() * intersectionNodes.length)];
                    console.log("Startpunkt-Fallback aktiv.");
                }

                targetPubNode = null;

                console.log("LOG 3: Suche Kneipe...");
                if (pubsData.length > 0) {
                    const targetDistSq = 0.000007;
                    let bestDiff = Infinity;
                    let realPubNode = null;
                    const startNode = nodesData[startNodeId];
                    pubsData.forEach(p => {
                        const distSq = Math.pow(p.lat - startNode.lat, 2) + Math.pow(p.lon - startNode.lon, 2);
                        const diff = Math.abs(distSq - targetDistSq);
                        if (diff < bestDiff) {
                            bestDiff = diff;
                            realPubNode = p;
                        }
                    });
                    
                    if (realPubNode) {
                        targetPubNode = getNearestNode(realPubNode.lat, realPubNode.lon, intersectionNodes, nodesData);
                        if (targetPubNode) {
                            if (!targetPubNode.tags) targetPubNode.tags = {};
                            targetPubNode.tags.name = realPubNode.tags ? (realPubNode.tags.name || "Kneipe") : "Kneipe";
                            targetPubNode.isKneipe = true;
                            const distMeters = Math.sqrt(dist2(targetPubNode, realPubNode)) * 111000;
                            console.log(`Kneipe an Knoten-ID ${targetPubNode.id} gebunden. Distanz zum realen POI: ${distMeters.toFixed(1)} Meter.`);
                        }
                    }
                }
                
                if (!targetPubNode) {
                    // Fallback, falls keine Kneipe gefunden wurde
                    if (intersectionNodes.length > 1) {
                        const startNode = nodesData[startNodeId];
                        const targetDistSq = 0.000007;
                        let bestDiff = Infinity;
                        intersectionNodes.forEach(id => {
                            if (id === startNodeId) return;
                            const node = nodesData[id];
                            const distSq = Math.pow(node.lat - startNode.lat, 2) + Math.pow(node.lon - startNode.lon, 2);
                            const diff = Math.abs(distSq - targetDistSq);
                            if (diff < bestDiff) {
                                bestDiff = diff;
                                targetPubNode = node;
                            }
                        });
                        
                        if (targetPubNode) {
                            if (!targetPubNode.tags) targetPubNode.tags = {};
                            targetPubNode.tags.name = "Lokale Gaststätte";
                            targetPubNode.isKneipe = true;
                            console.log(`Kneipe an Knoten-ID ${targetPubNode.id} gebunden (Fallback). Distanz zum realen POI: 0.0 Meter.`);
                        }
                    }
                }

                if (targetPubNode) {
                    targetName = targetPubNode.tags.name || "Lokale Gaststätte";
                }

                console.log("LOG 4: Setze Spielfigur & grüne Punkte...");
                if (!tutorialFinished) {
                    tutorialActive = true;
                    startTutorial();
                }

                gameActive = true;
                budget = 300;
                moveCounter = 0;
                document.getElementById('hud-container').innerText = `GUTHABEN: ${budget} €`;
                document.getElementById('hud-container').style.display = 'block';

                moveToNode(startNodeId, true);
            } else {
                console.warn("Keine Kreuzungen im Ausschnitt gefunden.");
                const container = document.getElementById('tutorial-container');
                container.innerHTML = "<h2>Fehler</h2><p>KEINE KREUZUNGEN GEFUNDEN. BITTE ANDEREN STANDORT WÄHLEN.</p>";
            }
        }

        function startTutorial() {
            if (tutorialFinished) return;
            tutorialActive = true;
            const container = document.getElementById('tutorial-container');
            container.innerHTML = "<h2>Mission gestartet</h2><p>STANDORT ERFASST. BEWEGE DICH ZU EINEM BENACHBARTEN GRÜNEN KNOTENPUNKT, UM DIE STATISTISCHE SIGNATUR ZU VERSCHLEIERN.</p>";
            container.style.display = 'block';
        }

        function completeTutorial() {
            if (!tutorialActive) return;
            tutorialActive = false;
            tutorialFinished = true;
            const container = document.getElementById('tutorial-container');
            container.innerHTML = "<h2>Ziel erreicht</h2><p>ERSTER SCHRITT ERFOLGREICH. SIGNATUR GEDÄMPFT. JEDER SCHRITT KOSTET 10 EURO. DU MUSST SPARSAM MIT DEM GELD UMGEHEN, DU HAST NUR 300 EURO ZUR VERFÜGUNG.</p>";
        }

        function pubVisited() {
            gameActive = false;
            
            if (pubMarker) {
                pubMarker.setIcon(pubIconNormal);
            }

            document.getElementById('tutorial-container').style.display = 'none';
            document.getElementById('options-container').style.display = 'block';
            
            // Bewegung verhindern
            neighborMarkers.forEach(m => map.removeLayer(m));
            neighborMarkers = [];
        }

        function selectOption(opt) {
            document.getElementById('options-container').style.display = 'none';
            alert("Option " + opt + " gewählt! (Logik folgt...)");
            gameActive = true;
        }

        function evaluateGameState() {
            if (!targetPubNode || !pubMarker || !playerMarker) return;
            
            // 1. Hole die aktuellen Koordinaten von Spieler und Kneipe
            let playerPos = playerMarker.getLatLng(); 
            let kneipePos = pubMarker.getLatLng();
            
            // 2. Berechne Distanz in Metern (Leaflet nativ)
            let distanceInMeters = map.distance(playerPos, kneipePos);
            
            console.log("=== DISTANZ-KOLLISION ===");
            console.log("Distanz zur Kneipe:", distanceInMeters.toFixed(2), "Meter");
            
            // 3. Trigger (50 Meter Radius)
            if (distanceInMeters <= 50) {
                pubMarker.setIcon(pubIconActive); // Icon leuchtet auf
                canInteractWithPub = true;
                console.log("Status: INNERHALB des 50m Radius -> Aktiv");
            } else {
                pubMarker.setIcon(pubIconNormal); // Standard Icon
                canInteractWithPub = false;
                console.log("Status: AUSSERHALB -> Inaktiv");
            }
        }

        function gameOver() {
            gameActive = false;
            const container = document.getElementById('tutorial-container');
            container.innerHTML = "<h2>Game Over</h2><p>FINANZIELLE MITTEL ERSCHÖPFT. DIE STATISTIK HAT DICH EINGEHOLT.</p>";
            container.style.display = 'block';
            container.style.borderColor = '#ef4444';
            
            // Bewegung verhindern
            neighborMarkers.forEach(m => map.removeLayer(m));
            neighborMarkers = [];
        }

        function backToMenu() {
            document.getElementById('intro-overlay').style.display = 'flex';
            document.getElementById('back-to-menu').style.display = 'none';
            resetGameState();
        }

        function resetGameState() {
            nodesData = {};
            waysData = {};
            nodeToWays = {};
            pubsData = [];
            targetPubNode = null;
            targetName = "";
            if (playerMarker) map.removeLayer(playerMarker);
            playerMarker = null;
            if (pubMarker) map.removeLayer(pubMarker);
            pubMarker = null;
            neighborMarkers.forEach(m => map.removeLayer(m));
            neighborMarkers = [];
            budget = 300;
            moveCounter = 0;
            gameActive = false;
            document.getElementById('hud-container').style.display = 'none';
            document.getElementById('tutorial-container').style.display = 'none';
            document.getElementById('tutorial-container').style.borderColor = '#22c55e';
            document.getElementById('options-container').style.display = 'none';
            canInteractWithPub = false;
        }

        function createPlayerMarker(coords) {
            var playerIcon = L.divIcon({
                className: 'player-marker',
                html: '<div class="player-dot"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            if (playerMarker) {
                playerMarker.setLatLng(coords);
            } else {
                playerMarker = L.marker(coords, {icon: playerIcon, zIndexOffset: 1000}).addTo(map);
            }
        }

        async function loadNetwork(bounds) {
            const center = map.getCenter();
            const offset = 0.005; 
            const s = center.lat - offset;
            const w = center.lng - offset;
            const n = center.lat + offset;
            const e = center.lng + offset;

            const query = `
                [out:json][timeout:15];
                (
                    way["highway"](${s},${w},${n},${e});
                    node["amenity"~"pub|bar"](${s},${w},${n},${e});
                );
                (._;>;);
                out body;
            `;
            try {
                const response = await fetch('https://overpass-api.de/api/interpreter', {
                    method: 'POST',
                    body: 'data=' + encodeURIComponent(query)
                });
                if (!response.ok) return false;
                const data = await response.json();
                
                data.elements.forEach(el => {
                    if (el.type === 'node') {
                        nodesData[el.id] = el;
                        if (el.tags && (el.tags.amenity === 'pub' || el.tags.amenity === 'bar')) {
                            pubsData.push(el);
                        }
                    } else if (el.type === 'way') {
                        waysData[el.id] = el;
                        el.nodes.forEach(nodeId => {
                            if (!nodeToWays[nodeId]) nodeToWays[nodeId] = new Set();
                            nodeToWays[nodeId].add(el.id);
                        });
                    }
                });
                return true;
            } catch (err) {
                console.error("Netzwerk-Fehler:", err);
                return false;
            }
        }

        function moveToNode(nodeId, isInitial = false) {
            if (!gameActive && !isInitial) return;
            
            const targetNode = nodesData[nodeId];
            if (targetNode && targetNode.isKneipe === true) {
                pubVisited();
                return;
            }

            if (tutorialActive && !isInitial) completeTutorial();
            
            let skipPan = false;
            
            if (!isInitial) {
                budget -= 10;
                moveCounter++;
                
                let hudText = `GUTHABEN: ${budget} €`;
                if (moveCounter >= 3 && targetName) {
                    hudText += ` | ${targetName} besuchen`;
                }
                document.getElementById('hud-container').innerText = hudText;
                
                if (moveCounter === 1 && targetPubNode && !pubMarker) {
                    // NEU: Dem targetPane zuweisen, damit das Icon nie verschwindet!
                    pubMarker = L.marker([targetPubNode.lat, targetPubNode.lon], {
                            icon: pubIconNormal,
                            pane: 'targetPane'
                        })
                        .addTo(map)
                        .on('click', () => {
                            if (!canInteractWithPub) return;
                            pubVisited();
                        });
                        
                    pubMarker.bindTooltip(targetName, {permanent: false, direction: 'top'});
                    
                    const targetN = nodesData[nodeId];
                    map.flyToBounds(L.latLngBounds([targetN.lat, targetN.lon], [targetPubNode.lat, targetPubNode.lon]).pad(0.3), {
                        duration: 2.5,
                        easeLinearity: 0.25
                    });
                    skipPan = true;
                }

                if (moveCounter === 3) {
                    if (pubMarker && pubMarker.getElement()) {
                        pubMarker.getElement().classList.add('sonar-active');
                    }
                    const container = document.getElementById('tutorial-container');
                    container.innerHTML += "<br><br><strong style='color:#facc15;'>Besuch die Gaststätte, vielleicht erfährst du dort, wie du schnell an Geld kommen kannst.</strong>";
                }

                if (moveCounter === 7) {
                    document.getElementById('tutorial-container').style.display = 'none';
                }
                
                if (budget <= 0) {
                    budget = 0;
                    document.getElementById('hud-container').innerText = `GUTHABEN: ${budget} €`;
                    gameOver();
                }
            }
            
            currentPlayerNodeId = nodeId;
            const node = nodesData[nodeId];
            if (!node) return;

            const coords = [node.lat, node.lon];
            createPlayerMarker(coords);
            if (!skipPan) {
                map.panTo(coords);
            }
            
            if (budget > 0) {
                evaluateGameState();
                updateNeighbors(nodeId);
            }
        }

        function updateNeighbors(nodeId) {
            neighborMarkers.forEach(m => map.removeLayer(m));
            neighborMarkers = [];

            const neighbors = findNextIntersections(nodeId);
            
            // Radikale Fehlerüberwachung
            const neighborsArray = Array.from(neighbors);
            console.log("Stehe auf:", nodeId, "Nachbarn:", neighborsArray);
            if (neighborsArray.length === 0) {
                console.warn("ACHTUNG: Sackgasse erreicht! Keine navigierbaren Nachbarn gefunden.");
            }
            
            neighbors.forEach(nId => {
                const node = nodesData[nId];
                if (!node) return;

                const neighborIcon = L.divIcon({
                    className: 'neighbor-marker',
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                });

                const marker = L.marker([node.lat, node.lon], {icon: neighborIcon})
                    .addTo(map)
                    .on('click', () => moveToNode(nId));
                
                if (tutorialActive) {
                    const el = marker.getElement();
                    if (el) {
                        el.classList.add('tutorial-pulse');
                    }
                }
                
                neighborMarkers.push(marker);
            });
        }

        function findNextIntersections(nodeId) {
            const neighbors = new Set();
            const ways = nodeToWays[nodeId] || [];
            
            ways.forEach(wayId => {
                const way = waysData[wayId];
                if (!way || !way.nodes) return;
                
                const nodes = way.nodes;
                const index = nodes.indexOf(parseInt(nodeId));
                if (index === -1) return;

                // Suche vorwärts
                for (let i = index + 1; i < nodes.length; i++) {
                    const nextId = nodes[i];
                    // Prüfe, ob es ein gültiger Knoten ist (in nodesData) und entweder Kreuzung oder Endpunkt
                    if (nodesData[nextId] && nodeToWays[nextId]) {
                        if (nodeToWays[nextId].size > 1 || i === nodes.length - 1) {
                            neighbors.add(nextId);
                            break;
                        }
                    }
                }
                
                // Suche rückwärts
                for (let i = index - 1; i >= 0; i--) {
                    const prevId = nodes[i];
                    if (nodesData[prevId] && nodeToWays[prevId]) {
                        if (nodeToWays[prevId].size > 1 || i === 0) {
                            neighbors.add(prevId);
                            break;
                        }
                    }
                }
            });
            return neighbors;
        }

        map.whenReady(() => {
            // Wir warten nun auf den Start-Button im Intro
        });
    </script>
