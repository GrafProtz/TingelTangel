<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridCrime - Das Verbrechen in DEINER Stadt</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E1RX6GJRVB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E1RX6GJRVB');
    </script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Eigene Styles -->
    <link rel="stylesheet" href="style.css" />
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

    <!-- Startbildschirm -->
    <div id="intro-overlay">
        <div class="branding">
            <h1>GridCrime</h1>
            <p>DAS VERBRECHEN IN DEINER STADT</p>
        </div>
        <div class="menu-card">
            <select id="city-dropdown-intro">
                <option value="" disabled selected>Einsatzort wählen...</option>
            </select>
            <button class="start-btn" id="btn-new-game">MISSION STARTEN</button>
            <button class="start-btn" id="btn-continue-game" style="display: none; margin-top: 10px; background: var(--color-secondary);">MISSION FORTSETZEN</button>
        </div>
    </div>

    <!-- In-Game UI -->
    <div id="budget-panel" style="display: none;">
        Budget: 0 €
    </div>


    <div id="app-container">
        <div id="map"></div>
    </div>
    
    <!-- Cinematic Loop Overlay (Lockpick-Animation & Clickblock) -->
    <div id="cinema-overlay"></div>
    
    <!-- Pub Overlay (Screen Space) -->
    <div id="pub-overlay-ui" class="pub-inactive" style="display: none;"></div>

    <!-- Info Modal & Sidebar Log -->
    <div id="info-modal" class="hidden">
        <h2 id="info-modal-title"></h2>
        <p id="info-modal-text"></p>
        <button id="info-modal-btn">Verstanden</button>
    </div>
    <button id="sidebar-toggle">Logbuch</button>
    <div id="sidebar-log" class="sidebar-closed">
        <button id="back-to-menu" style="display: none; margin-bottom: 1rem;">← Hauptmenü</button>
        <div id="sidebar-log-content"></div>
    </div>

    <!-- Start der App via ES6-Modul -->
    <script type="module" src="main.js"></script>
</body>
</html>
